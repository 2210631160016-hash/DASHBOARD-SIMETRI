<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SIMETRI Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
                135deg,
                #ff5ab7,
                #8a4dff
            );
        }

        .login-container{

            width:400px;

            background:white;

            padding:40px;

            border-radius:25px;

            text-align:center;

            box-shadow:
            0 15px 35px rgba(0,0,0,0.15);
        }

        .logo{

            width:150px;

            margin-bottom:20px;
        }

        h1{

            color:#8a4dff;

            margin-bottom:10px;
        }

        .subtitle{

            color:#777;

            margin-bottom:30px;
        }

        .input-group{

            margin-bottom:20px;
        }

        .input-group input{

            width:100%;

            padding:15px;

            border:2px solid #e0e0e0;

            border-radius:12px;

            outline:none;

            font-size:15px;

            transition:.3s;
        }

        .input-group input:focus{

            border-color:#8a4dff;
        }

        .btn-login{

            width:100%;

            padding:15px;

            border:none;

            border-radius:12px;

            background:
            linear-gradient(
                90deg,
                #ff5ab7,
                #8a4dff
            );

            color:white;

            font-size:16px;

            font-weight:600;

            cursor:pointer;

            transition:.3s;
        }

        .btn-login:hover{

            transform:translateY(-2px);
        }

        .footer{

            margin-top:20px;

            color:#999;

            font-size:13px;
        }

    </style>

</head>

<body>

    <div class="login-container">

        <img src="assets/logo-simetri.png"
            alt="Logo SIMETRI"
            class="logo">

        <h1>SIMETRI</h1>

        <p class="subtitle">
            Sistem Medis Troli Otonom Terintegrasi
        </p>

        <div class="input-group">

            <input
                type="email"
                id="email"
                placeholder="Masukkan Email">

        </div>

        <div class="input-group">

            <input
                type="password"
                id="password"
                placeholder="Masukkan Password">

        </div>

        <button
            class="btn-login"
            onclick="login()">

            Login

        </button>

        <div class="footer">

            © 2026 SIMETRI

        </div>

    </div>

    <script>

        function login(){

            const email =
            document.getElementById("email").value;

            const password =
            document.getElementById("password").value;

            if(
                email === "" ||
                password === ""
            ){

                alert(
                    "Email dan Password wajib diisi!"
                );

                return;
            }

            if(
                email === "simetri@gmail.com" &&
                password === "123456"
            ){

                alert(
                    "Login Berhasil!"
                );

                window.location.href =
                "dashboard.html";

            }
            else{

                alert(
                    "Email atau Password Salah!"
                );

            }

        }

        
    </script>

</body>

</html>
