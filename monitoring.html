<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Monitoring SIMETRI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            display:flex;
            min-height:100vh;
            background:#f5f6fa;
        }

        /* =========================
           SIDEBAR
        ========================== */

        .sidebar{

            width:270px;

            background:
            linear-gradient(
                180deg,
                #ff5ab7,
                #8a4dff
            );

            color:white;

            padding:25px;

            min-height:100vh;
        }

        .sidebar-logo{

            text-align:center;

            margin-bottom:40px;
        }

        .sidebar-logo img{

            width:120px;

            background:white;

            padding:10px;

            border-radius:20px;
        }

        .sidebar-logo h2{

            margin-top:15px;
            font-size:24px;
        }

        .sidebar ul{

            list-style:none;
        }

        .sidebar ul li{

            margin-bottom:15px;
        }

        .sidebar ul li a{

            display:block;

            text-decoration:none;

            color:white;

            padding:15px;

            border-radius:15px;

            transition:0.3s;
        }

        .sidebar ul li a:hover{

            background:
            rgba(255,255,255,0.2);

            transform:translateX(5px);
        }

        .active{

            background:
            rgba(255,255,255,0.25);
        }

        /* =========================
           MAIN
        ========================== */

        .main{

            flex:1;

            padding:40px;
        }

        .header{

            margin-bottom:30px;
        }

        .header h1{

            color:#333;
        }

        .header p{

            color:#777;
        }

        /* =========================
           CARDS
        ========================== */

        .cards{

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(250px,1fr));

            gap:25px;
        }

        .card{

            background:white;

            border-radius:20px;

            padding:25px;

            text-align:center;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.08);

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-5px);
        }

        .card h3{

            color:#888;

            margin-bottom:15px;
        }

        .card h2{

            color:#7b3cff;

            font-size:32px;
        }

        /* =========================
           POSITION CARD
        ========================== */

        .position-card{

            margin-top:30px;

            background:white;

            border-radius:20px;

            padding:30px;

            box-shadow:
            0 10px 25px rgba(0,0,0,0.08);
        }

        .position-card h2{

            color:#7b3cff;

            margin-bottom:20px;
        }

        .position-info{

            font-size:20px;

            line-height:2;
        }

        .position-info span{

            font-weight:600;
        }

        /* =========================
           RESPONSIVE
        ========================== */

        @media(max-width:900px){

            body{
                flex-direction:column;
            }

            .sidebar{
                width:100%;
                min-height:auto;
            }
        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="sidebar-logo">

            <img src="assets/logo-simetri.png" alt="SIMETRI">

            <h2>SIMETRI</h2>

        </div>

        <ul>

            <li>
                <a href="dashboard.html">
                     Dashboard
                </a>
            </li>

            <li>
                <a href="monitoring.html" class="active">
                     Monitoring
                </a>
            </li>

            <li>
                <a href="controlling.html">
                     Controlling
                </a>
            </li>

            <li>
                <a href="index.html">
                     Logout
                </a>
            </li>

        </ul>

    </div>

    <!-- MAIN CONTENT -->

    <div class="main">

        <div class="header">

            <h1>Monitoring SIMETRI</h1>

            <p>
                Monitoring kondisi troli secara real-time
            </p>

        </div>

        <!-- MONITORING CARDS -->

        <div class="cards">

    <div class="card">
         <h3>Battery</h3>
         <h2 id="battery">0%</h2>
    </div>

    <div class="card">
         <h3>Voltage</h3>
         <h2 id="voltage">0 V</h2>
    </div>

    <div class="card">
         <h3>Current</h3>
         <h2 id="current">0 A</h2>
    </div>

    <div class="card">
         <h3>RPM Left</h3>
         <h2 id="rpmLeft">0</h2>
    </div>

    <div class="card">
         <h3>RPM Right</h3>
         <h2 id="rpmRight">0</h2>
    </div>

    <div class="card">
         <h3>Status</h3>
         <h2 id="status">-</h2>
    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCT0ovWf3eXggDubwd6p9pZcAm9BO6iV2A",
  authDomain: "simetri-b23b6.firebaseapp.com",
  databaseURL: "https://simetri-b23b6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "simetri-b23b6",
  storageBucket: "simetri-b23b6.firebasestorage.app",
  messagingSenderId: "81806142295",
  appId: "1:81806142295:web:892319c77582b1e8612c12"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const monitoringRef = ref(db, "monitoring");

onValue(monitoringRef, (snapshot) => {

  const data = snapshot.val();

  if (!data) return;

  document.getElementById("voltage").innerHTML =
    data.voltage + " V";

  document.getElementById("current").innerHTML =
    data.current + " A";

    document.getElementById("rpmLeft").innerHTML =
    data.rpm_left;

document.getElementById("rpmRight").innerHTML =
    data.rpm_right;

document.getElementById("status").innerHTML =
    data.status;

  // sementara battery dummy
  document.getElementById("battery").innerHTML =
    "100%";

});

</script>

</body>

</html>
